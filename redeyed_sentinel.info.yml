name: 'Redeyed Sentinel CAPTCHA'
type: module
description: 'Friendly, privacy-respecting human verification on the login, registration, password-reset and contact forms, powered by Redeyed Sentinel. Each form is toggleable, blocked attempts can be logged, and it stays inert until you add your keys.'
core_version_requirement: ^10 || ^11
package: 'Spam control'
version: '1.0.4'
configure: redeyed_sentinel.settings

# Standalone module: no dependency on the contrib CAPTCHA module.
# Integration is done through hook_form_alter() + a validation handler.
