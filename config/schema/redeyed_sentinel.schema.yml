      type: string
      label: 'Base URL'
    widget:
      type: string
      label: 'Widget type'
    theme:
      type: string
      label: 'Theme'
    scheme:
      type: string
      label: 'Colour scheme'
    difficulty:
      type: string
      label: 'Difficulty'
    width:
      type: string
      label: 'Width'
