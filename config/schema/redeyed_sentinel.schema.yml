redeyed_sentinel.settings:
  type: config_object
  label: 'Redeyed Sentinel CAPTCHA settings'
  mapping:
    site_key:
      type: string
      label: 'Site key (public)'
    secret_key:
      type: string
      label: 'Secret key'
    base_url:
      type: string
      label: 'Base URL'
    enable_login:
      type: boolean
      label: 'Protect the login form'
    enable_register:
      type: boolean
      label: 'Protect the registration form'
    enable_lostpassword:
      type: boolean
      label: 'Protect the password-reset form'
    enable_contact:
      type: boolean
      label: 'Protect the contact forms'
    enable_logging:
      type: boolean
      label: 'Log blocked attempts'
    widget:
      type: string
      label: 'Widget type'
    theme:
      type: string
      label: 'Theme'
    scheme:
      type: string
      label: 'Colour scheme'
    difficulty:
      type: string
      label: 'Difficulty'
    width:
      type: string
      label: 'Width'
